name: Build Windows exe

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Baixar modelos do DocAligner (cache local para o bundle)
        run: python scripts/baixar_modelos.py

      - name: Build com PyInstaller
        run: pyinstaller cortadoc.spec

      - name: Publicar artifact
        uses: actions/upload-artifact@v4
        with:
          name: CortaDoc-windows
          path: dist/CortaDoc.exe
